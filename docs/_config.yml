# Sailor Documentation Site Configuration

# Site settings
title: "Sailor - Mermaid Diagram Generator"
description: "Generate, render, and export Mermaid diagrams with AI. Web editor with live preview, theme switching, and MCP server integration for Claude Desktop."
baseurl: "/sailor"
url: "https://aj-geddes.github.io"
lang: "en-US"
author:
  name: "aj-geddes"
  url: "https://github.com/aj-geddes"
logo: "/sailor/screenshots/01-default-view.png"
image:
  path: "/sailor/screenshots/01-default-view.png"
  width: 1440
  height: 900
  alt: "Sailor Mermaid diagram editor showing a flowchart with live preview"

# Social / Open Graph
social:
  name: "Sailor"
  links:
    - "https://github.com/aj-geddes/sailor"

# Theme configuration
theme: jekyll-theme-cayman
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Navigation
nav_links:
  - title: Home
    url: /
  - title: Showcase
    url: /showcase
  - title: Setup Guide
    url: /setup-guide
  - title: Admin Guide
    url: /admin-guide
  - title: Operations Guide
    url: /operations-guide
  - title: Troubleshooting
    url: /troubleshooting-guide

# Sailor theme colors (nautical theme)
sailor_colors:
  primary: "#0066cc"      # Ocean blue
  secondary: "#1e90ff"    # Dodger blue
  accent: "#20b2aa"       # Light sea green
  dark: "#003366"         # Navy
  light: "#e6f2ff"        # Light blue

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  hard_wrap: false

# Mermaid configuration
mermaid:
  enabled: true
  version: "10.6.1"

# Default front matter
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
      image:
        path: "/sailor/screenshots/01-default-view.png"
        width: 1440
        height: 900
        alt: "Sailor Mermaid diagram editor"

# Exclude from build
exclude:
  - README.md
  - DOCKER.md
  - PRODUCTION.md
  - archive/
  - vendor/
  - Gemfile
  - Gemfile.lock

# GitHub metadata
github:
  repository_url: https://github.com/aj-geddes/sailor
  repository_name: sailor
